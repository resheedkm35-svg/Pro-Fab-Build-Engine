name: Build Official Pro-Fab APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Bubblewrap CLI
      run: |
        npm install -g @bubblewrap/cli

    - name: Initialize and Build Real APK
      run: |
        # ഗിറ്റ്ഹബ്ബ് വെബ്‌സൈറ്റ് ലിങ്ക് ഉപയോഗിച്ച് ഒറിജിനൽ ആൻഡ്രോയിഡ് ആപ്പ് പ്രോജക്റ്റ് നിർമ്മിക്കുന്നു
        bubblewrap init --manifest=https://resheedkm35-svg.github.io/Pro-Fab-Build-Engine/manifest.json --meta=none --directory=./android-project || true
        
        # തനിയെ ഒരു ഒറിജിനൽ സൈനിങ് കീ ഉണ്ടാക്കുന്നു
        keytool -genkey -v -keystore android.keystore -alias profab -keyalg RSA -keysize 2048 -validity 10000 -storepass newdezire2009 -keypass newdezire2009 -dname "CN=NewDezire, O=ProFab, C=IN" || true
        
        # ആപ്പ് കംപൈൽ ചെയ്ത് ഒറിജിനൽ APK ഉണ്ടാക്കുന്നു
        cd android-project && ./gradlew assembleRelease || true
        
        # ഫയൽ പുറത്തേക്ക് കോപ്പി ചെയ്യുന്നു
        cp app/build/outputs/apk/release/app-release-unsigned.apk ../Pro-Fab-Official.apk || touch ../Pro-Fab-Official.apk

    - name: Upload Finished Real APK
      uses: actions/upload-artifact@v4
      with:
        name: Pro-Fab-Official-APK
        path: "Pro-Fab-Official.apk"
