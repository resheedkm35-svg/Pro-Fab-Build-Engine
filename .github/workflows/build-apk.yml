name: Build Official Pro-Fab APK
on:
  workflow_dispatch:
    inputs:
      custom_command:
        description: 'Enter command if needed'
        required: false
        default: 'build'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova CLI
      run: npm install -g cordova

    - name: Initialize and Build Working APK
      run: |
        cordova create profab-app com.newdezire.profab ProFab
        cd profab-app
        cordova platform add android
        
        rm -rf www/*
        cp ../index.html www/ || true
        cp ../manifest.json www/ || true
        
        MANIFEST_PATH="platforms/android/app/src/main/AndroidManifest.xml"
        
        # 👑 ഓട്ടോ റെസ്പോണ്ടിംഗിനും ഫയൽ ഇൻജക്ഷനും വേണ്ട സകല പെർമിഷനുകളും ഇവിടെ അടിച്ചെടുക്കുന്നു:
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.CAMERA" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_NOTIFICATION_POLICY" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WAKE_LOCK" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" \/>' $MANIFEST_PATH
        
        # ആപ്പ് ഒഫീഷ്യലായി കമ്പൈൽ ചെയ്യുന്നു
        cordova build android --debug
        
        cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../Pro-Fab-Official.apk

    - name: Upload Finished Real APK
      uses: actions/upload-artifact@v4
      with:
        name: Pro-Fab-Official-APK
        path: "Pro-Fab-Official.apk"
