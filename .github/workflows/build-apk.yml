name: Build Official Pro-Fab APK
on:
  workflow_dispatch:
    inputs:
      custom_command:
        description: 'Enter your custom build command if needed'
        required: false
        default: 'gradlew assembleDebug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # ഇവിടെ നമ്മൾ ഗ്രേഡിൽ വേർഷൻ 8.1.1 ആയി ലോക്ക് ചെയ്യുന്നു (പ്രശ്നം തീർക്കാൻ)
    - name: Setup Gradle Engine Version
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.1.1'

    - name: Setup Android Project Files
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/newdezire/profab
        cp index.html app/src/main/assets/
        cp manifest.json app/src/main/assets/ || true

        cat <<EOF > settings.gradle
        rootProject.name = "Pro-Fab"
        include ':app'
        EOF

        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.newdezire.profab'
            compileSdk 33
            defaultConfig {
                applicationId "com.newdezire.profab"
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="Pro-Fab" android:theme="@android:style/Theme.NoTitleBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat <<EOF > app/src/main/java/com/newdezire/profab/MainActivity.java
        package com.newdezire.profab;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;

        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF

    - name: Generate Local Wrapper
      run: |
        gradle wrapper --gradle-version 8.1.1
        chmod +x gradlew

    - name: Run Compiler Command From Input Box
      run: |
        if [ "${{ github.event.inputs.custom_command }}" = "gradlew assembleDebug" ]; then
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ./Pro-Fab-Official.apk
        else
          ${{ github.event.inputs.custom_command }}
        fi

    - name: Upload Finished Real APK
      uses: actions/upload-artifact@v4
      with:
        name: Pro-Fab-Official-APK
        path: "Pro-Fab-Official.apk"
