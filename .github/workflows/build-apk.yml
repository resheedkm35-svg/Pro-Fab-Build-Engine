name: Build Official Pro-Fab APK
on:
  workflow_dispatch:
    inputs:
      custom_command:
        description: 'Enter command if needed'
        required: false
        default: 'build'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # ഇവിടെ നമ്മൾ Cordova എഞ്ചിൻ പൂർണ്ണമായി ഇൻസ്റ്റാൾ ചെയ്യുന്നു
    - name: Install Cordova CLI
      run: npm install -g cordova

    # ഇവിടെയാണ് നമ്മൾ ഫയൽ പെർമിഷനുകൾ ആപ്പിലേക്ക് ഇൻജക്റ്റ് ചെയ്യുന്നത്
    - name: Initialize and Build Working APK
      run: |
        cordova create profab-app com.newdezire.profab ProFab
        cd profab-app
        cordova platform add android
        
        # നമ്മുടെ വെബ്‌സൈറ്റ് ഫയലുകൾ ആപ്പിന്റെ ഉള്ളിലേക്ക് മാറ്റുന്നു
        rm -rf www/*
        cp ../index.html www/ || true
        cp ../manifest.json www/ || true
        
        # ആൻഡ്രോയിഡ് ആപ്പിലേക്ക് ഫയൽ പെർമിഷനുകൾ മാന്വലായി ഇൻജക്റ്റ് ചെയ്യുന്നു
        MANIFEST_PATH="platforms/android/app/src/main/AndroidManifest.xml"
        
        # ആപ്പിൽ സ്റ്റോറേജ് പെർമിഷൻ ടാഗുകൾ ചേർക്കുന്നു
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
        
        # ആപ്പ് ഒഫീഷ്യലായി കംപൈൽ ചെയ്ത് ഒറിജിനൽ APK ഉണ്ടാക്കുന്നു
        cordova build android --debug
        
        # ഉണ്ടായ ശരിക്കുള്ള ഫയൽ പുറത്തേക്ക് കോപ്പി ചെയ്യുന്നു
        cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../Pro-Fab-Official.apk

    - name: Upload Finished Real APK
      uses: actions/upload-artifact@v4
      with:
        name: Pro-Fab-Official-APK
        path: "Pro-Fab-Official.apk"
