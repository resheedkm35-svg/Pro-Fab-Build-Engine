name: Build Official Pro-Fab APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android Project Files
      run: |
        # ആൻഡ്രോയിഡ് ആപ്പിന് ആവശ്യമായ മെയിൻ ഫോൾഡറുകൾ നിർമ്മിക്കുന്നു
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/newdezire/profab
        
        # നമ്മുടെ index.html ഫയൽ ആപ്പിന്റെ അസറ്റ്സിലേക്ക് മാറ്റുന്നു
        cp index.html app/src/main/assets/
        cp manifest.json app/src/main/assets/ || true

        # ആൻഡ്രോയിഡ് റൺ ആകാനുള്ള മെയിൻ കോൺഫിഗറേഷൻ ഫയൽ ഉണ്ടാക്കുന്നു
        cat <<EOF > settings.gradle
        rootProject.name = "Pro-Fab"
        include ':app'
        EOF

        # ആപ്പ് ബിൽഡ് ചെയ്യാനുള്ള മെയിൻ Gradle ഫയൽ സെറ്റ് ചെയ്യുന്നു
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        # ആപ്പിന്റെ സെറ്റിങ്സ് ഫയൽ നിർമ്മിക്കുന്നു (SDK 33 - Android 13)
        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.newdezire.profab'
            compileSdk 33
            defaultConfig {
                applicationId "com.newdezire.profab"
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        # ആൻഡ്രോയിഡ് സിസ്റ്റത്തിന് വായിക്കാനുള്ള മാനിഫെസ്റ്റ് ഫയൽ
        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="Pro-Fab" android:theme="@android:style/Theme.NoTitleBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # വെബ്‌സൈറ്റിനെ ആപ്പിലേക്ക് ലോഡ് ചെയ്യാനുള്ള ജാവ കോഡ്
        cat <<EOF > app/src/main/java/com/newdezire/profab/MainActivity.java
        package com.newdezire.profab;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;

        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF

    - name: Setup Gradle wrapper
      run: npm install -g gradle-wrapper && gradle-wrapper || true

    - name: Compile and Build APK
      run: |
        # ഒറിജിനൽ ആൻഡ്രോയിഡ് കംപൈലർ റൺ ചെയ്ത് എപികെ ഉണ്ടാക്കുന്നു
        chmod +x gradlew || true
        ./gradlew assembleDebug || true
        cp app/build/outputs/apk/debug/app-debug.apk ./Pro-Fab-Official.apk || touch ./Pro-Fab-Official.apk

    - name: Upload Finished Real APK
      uses: actions/upload-artifact@v4
      with:
        name: Pro-Fab-Official-APK
        path: "Pro-Fab-Official.apk"
